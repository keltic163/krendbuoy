name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply selectable audio preset patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          game = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = game.read_text()
          text = text.replace('private AudioTrack audioTrack;\n', 'private AudioTrack audioTrack;\n    private int audioBacklogSamples = 2048;\n')
          text = text.replace('Uri romUri = getIntent().getData();', 'Uri romUri = getIntent().getData();\n        audioBacklogSamples = getIntent().getIntExtra("audio_backlog_samples", 2048);\n        if (audioBacklogSamples != 1024 && audioBacklogSamples != 2048 && audioBacklogSamples != 4096) {\n            audioBacklogSamples = 2048;\n        }')
          text = text.replace('updateInfo("Running...\\n" + NativeBridge.getLastError());\n            startAudioPlayback();', 'NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);\n            updateInfo("Running... audio preset " + audioBacklogSamples + "\\n" + NativeBridge.getLastError());\n            startAudioPlayback();')
          text = text.replace('int bufferBytes = Math.max(minBufferBytes * 2, sampleRate);', 'int bufferBytes = minBufferBytes;')
          text = text.replace('int shortBufferSize = Math.max(2048, bufferBytes / 2);', 'int shortBufferSize = Math.max(512, bufferBytes / 4);')
          text = text.replace('Thread.sleep(4);', 'Thread.sleep(1);')
          text = text.replace('updateInfo(NativeBridge.getLastError());', 'updateInfo("audio preset " + audioBacklogSamples + "\\n" + NativeBridge.getLastError());')
          text = text.replace('.setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)\n                        .build()', '.setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)\n                        .setFlags(AudioAttributes.FLAG_LOW_LATENCY)\n                        .build()')
          game.write_text(text)

          native = Path('android-app/src/main/cpp/native_bridge.cpp')
          text = native.read_text()
          text = text.replace('static constexpr size_t MAX_AUDIO_SAMPLES = 32768;', 'static std::atomic_size_t audioMaxSamples{2048};')
          text = text.replace('if (audioBuffer.size() + samples > MAX_AUDIO_SAMPLES) {\n        size_t overflow = audioBuffer.size() + samples - MAX_AUDIO_SAMPLES;', 'size_t maxAudioSamples = audioMaxSamples.load();\n    if (audioBuffer.size() + samples > maxAudioSamples) {\n        size_t overflow = audioBuffer.size() + samples - maxAudioSamples;')
          text = text.replace('size_t count = std::min(static_cast<size_t>(std::min(maxSamples, capacity)), audioBuffer.size());', 'size_t maxAudioSamples = audioMaxSamples.load();\n    if (audioBuffer.size() > maxAudioSamples) {\n        audioBuffer.erase(audioBuffer.begin(), audioBuffer.end() - static_cast<long>(maxAudioSamples));\n    }\n    size_t count = std::min(static_cast<size_t>(std::min(maxSamples, capacity)), audioBuffer.size());')
          text = text.replace('extern "C" JNIEXPORT jint JNICALL Java_com_keltic_vbam_NativeBridge_readAudioSamples', 'extern "C" JNIEXPORT void JNICALL Java_com_keltic_vbam_NativeBridge_setAudioMaxBufferedSamples(JNIEnv*, jclass, jint samples) {\n    if (samples != 1024 && samples != 2048 && samples != 4096) samples = 2048;\n    audioMaxSamples.store(static_cast<size_t>(samples));\n}\nextern "C" JNIEXPORT jint JNICALL Java_com_keltic_vbam_NativeBridge_readAudioSamples')
          text = text.replace('" input=" + std::to_string(inputMask.load());', '" input=" + std::to_string(inputMask.load()) + " audioMax=" + std::to_string(audioMaxSamples.load());')
          native.write_text(text)
          PY

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
