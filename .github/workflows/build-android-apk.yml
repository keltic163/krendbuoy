name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply frontend runtime patches
        run: |
          python3 - <<'PY'
          from pathlib import Path

          game = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = game.read_text()
          text = text.replace('private AudioTrack audioTrack;\n', 'private AudioTrack audioTrack;\n    private int audioBacklogSamples = -1;\n')
          text = text.replace('Uri romUri = getIntent().getData();', 'Uri romUri = getIntent().getData();\n        audioBacklogSamples = getIntent().getIntExtra("audio_backlog_samples", -1);\n        if (audioBacklogSamples != -1 && audioBacklogSamples != 1024 && audioBacklogSamples != 2048 && audioBacklogSamples != 4096) {\n            audioBacklogSamples = -1;\n        }')
          text = text.replace('updateInfo("Running...\\n" + NativeBridge.getLastError());\n            startAudioPlayback();', 'NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);\n            updateInfo("Running... audio preset " + audioBacklogSamples + "\\n" + NativeBridge.getLastError());\n            startAudioPlayback();')
          text = text.replace('    protected void onPause() {\n        releaseAllButtons();\n        stopAudioPlayback();', '    protected void onPause() {\n        NativeBridge.saveSram();\n        releaseAllButtons();\n        stopAudioPlayback();')
          text = text.replace('        running = false;\n        stopAudioPlayback();', '        running = false;\n        NativeBridge.saveSram();\n        stopAudioPlayback();')
          text = text.replace('int bufferBytes = Math.max(minBufferBytes * 2, sampleRate);', 'int bufferBytes = minBufferBytes;')
          text = text.replace('int shortBufferSize = Math.max(2048, bufferBytes / 2);', 'int shortBufferSize = Math.max(512, bufferBytes / 4);')
          text = text.replace('Thread.sleep(4);', 'Thread.sleep(1);')
          text = text.replace('updateInfo(NativeBridge.getLastError());', 'updateInfo("audio preset " + audioBacklogSamples + "\\n" + NativeBridge.getLastError());')
          text = text.replace('.setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)\n                        .build()', '.setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)\n                        .setFlags(AudioAttributes.FLAG_LOW_LATENCY)\n                        .build()')
          game.write_text(text)

          native = Path('android-app/src/main/cpp/native_bridge.cpp')
          text = native.read_text()
          text = text.replace('#include <cstdarg>\n', '#include <cstdarg>\n#include <algorithm>\n#include <cstring>\n')
          text = text.replace('static std::vector<uint8_t> romData;\n', 'static std::vector<uint8_t> romData;\nstatic std::string currentSavePath;\n')
          text = text.replace('static constexpr size_t MAX_AUDIO_SAMPLES = 32768;', 'static std::atomic_int audioMode{-1};\nstatic std::atomic<size_t> audioMaxSamples{4096};')
          text = text.replace('typedef void (*retro_get_system_av_info_t)(retro_system_av_info*);\ntypedef void (*retro_run_t)();', 'typedef void (*retro_get_system_av_info_t)(retro_system_av_info*);\ntypedef void* (*retro_get_memory_data_t)(unsigned);\ntypedef size_t (*retro_get_memory_size_t)(unsigned);\ntypedef void (*retro_run_t)();')
          text = text.replace('static retro_get_system_av_info_t p_retro_get_system_av_info = nullptr;\nstatic retro_run_t p_retro_run = nullptr;', 'static retro_get_system_av_info_t p_retro_get_system_av_info = nullptr;\nstatic retro_get_memory_data_t p_retro_get_memory_data = nullptr;\nstatic retro_get_memory_size_t p_retro_get_memory_size = nullptr;\nstatic retro_run_t p_retro_run = nullptr;')
          marker = 'static uint32_t rgb565ToArgb(uint16_t p) {'
          helper = r'''static bool writeFile(const std::string& path, const void* data, size_t size) {
    std::ofstream f(path, std::ios::binary | std::ios::trunc);
    if (!f) return false;
    f.write(reinterpret_cast<const char*>(data), static_cast<std::streamsize>(size));
    return static_cast<bool>(f);
}

static std::string makeSramPath(const std::string& romPath) {
    size_t pos = romPath.find_last_of('/');
    std::string name = (pos == std::string::npos) ? romPath : romPath.substr(pos + 1);
    if (name.empty()) name = "selected.rom";
    return saveDir + "/" + name + ".srm";
}

static bool loadSramFromDisk() {
    if (!p_retro_get_memory_data || !p_retro_get_memory_size || currentSavePath.empty()) return false;
    void* data = p_retro_get_memory_data(RETRO_MEMORY_SAVE_RAM);
    size_t size = p_retro_get_memory_size(RETRO_MEMORY_SAVE_RAM);
    if (!data || size == 0) return false;
    std::vector<uint8_t> fileData;
    if (!readFile(currentSavePath, fileData)) {
        last = "No SRAM file yet: " + currentSavePath;
        return false;
    }
    size_t copySize = std::min(size, fileData.size());
    std::memcpy(data, fileData.data(), copySize);
    last = "SRAM loaded. bytes=" + std::to_string(copySize) + " path=" + currentSavePath;
    return true;
}

static bool saveSramToDisk() {
    if (!loaded || !p_retro_get_memory_data || !p_retro_get_memory_size || currentSavePath.empty()) return false;
    void* data = p_retro_get_memory_data(RETRO_MEMORY_SAVE_RAM);
    size_t size = p_retro_get_memory_size(RETRO_MEMORY_SAVE_RAM);
    if (!data || size == 0) {
        last = "No SRAM memory exposed by core.";
        return false;
    }
    bool ok = writeFile(currentSavePath, data, size);
    last = ok ? ("SRAM saved. bytes=" + std::to_string(size) + " path=" + currentSavePath) : ("SRAM save failed: " + currentSavePath);
    return ok;
}

'''
          text = text.replace(marker, helper + marker)
          text = text.replace('if (audioBuffer.size() + samples > MAX_AUDIO_SAMPLES) {\n        size_t overflow = audioBuffer.size() + samples - MAX_AUDIO_SAMPLES;', 'size_t maxAudioSamples = audioMaxSamples.load();\n    if (audioMode.load() == -1 && audioBuffer.size() + samples > 4096) {\n        size_t trimTo = 2048;\n        if (audioBuffer.size() > trimTo) audioBuffer.erase(audioBuffer.begin(), audioBuffer.end() - static_cast<long>(trimTo));\n    }\n    if (audioBuffer.size() + samples > maxAudioSamples) {\n        size_t overflow = audioBuffer.size() + samples - maxAudioSamples;')
          text = text.replace('LOADSYM(retro_get_system_info); LOADSYM(retro_get_system_av_info); LOADSYM(retro_run);', 'LOADSYM(retro_get_system_info); LOADSYM(retro_get_system_av_info); LOADSYM(retro_run);\n    p_retro_get_memory_data = reinterpret_cast<retro_get_memory_data_t>(dlsym(core, "retro_get_memory_data"));\n    p_retro_get_memory_size = reinterpret_cast<retro_get_memory_size_t>(dlsym(core, "retro_get_memory_size"));')
          text = text.replace('loaded = true; p_retro_get_system_av_info(&avInfo);\n    last = "retro_load_game success.', 'loaded = true; p_retro_get_system_av_info(&avInfo);\n    currentSavePath = makeSramPath(localPath);\n    loadSramFromDisk();\n    last = "retro_load_game success.')
          text = text.replace('size_t count = std::min(static_cast<size_t>(std::min(maxSamples, capacity)), audioBuffer.size());', 'size_t maxAudioSamples = audioMaxSamples.load();\n    if (audioMode.load() == -1 && audioBuffer.size() > 4096) {\n        audioBuffer.erase(audioBuffer.begin(), audioBuffer.end() - 2048);\n    } else if (audioBuffer.size() > maxAudioSamples) {\n        audioBuffer.erase(audioBuffer.begin(), audioBuffer.end() - static_cast<long>(maxAudioSamples));\n    }\n    size_t count = std::min(static_cast<size_t>(std::min(maxSamples, capacity)), audioBuffer.size());')
          text = text.replace('extern "C" JNIEXPORT jint JNICALL Java_com_keltic_vbam_NativeBridge_readAudioSamples', 'extern "C" JNIEXPORT void JNICALL Java_com_keltic_vbam_NativeBridge_setAudioMaxBufferedSamples(JNIEnv*, jclass, jint samples) {\n    if (samples != -1 && samples != 1024 && samples != 2048 && samples != 4096) samples = -1;\n    audioMode.store(samples);\n    audioMaxSamples.store(samples == -1 ? 4096 : static_cast<size_t>(samples));\n}\nextern "C" JNIEXPORT jint JNICALL Java_com_keltic_vbam_NativeBridge_readAudioSamples')
          text = text.replace('extern "C" JNIEXPORT jstring JNICALL Java_com_keltic_vbam_NativeBridge_getLastError', 'extern "C" JNIEXPORT jboolean JNICALL Java_com_keltic_vbam_NativeBridge_saveSram(JNIEnv*, jclass) { return saveSramToDisk() ? JNI_TRUE : JNI_FALSE; }\nextern "C" JNIEXPORT jstring JNICALL Java_com_keltic_vbam_NativeBridge_getLastError')
          text = text.replace('clearButtons(); clearAudio();\n    if (loaded && p_retro_unload_game) p_retro_unload_game();', 'saveSramToDisk(); clearButtons(); clearAudio();\n    if (loaded && p_retro_unload_game) p_retro_unload_game();')
          text = text.replace('" input=" + std::to_string(inputMask.load());', '" input=" + std::to_string(inputMask.load()) + " audioMode=" + std::to_string(audioMode.load()) + " audioMax=" + std::to_string(audioMaxSamples.load());')
          native.write_text(text)
          PY

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
