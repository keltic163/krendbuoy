name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch GameActivity in-game UI
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = path.read_text()

          def must_replace(src, old, new, label):
              if old not in src:
                  raise SystemExit(label + ' not found')
              return src.replace(old, new, 1)

          text = text.replace('content.setPadding(dp(8), dp(4), dp(8), dp(176));',
                              'content.setPadding(dp(8), dp(4), dp(8), dp(392));')

          if 'private int startupLoadStateSlot = 0;' not in text:
              text = must_replace(
                  text,
                  '    private int displayMode = 0;\n    private boolean debugTextVisible = false;',
                  '    private int displayMode = 0;\n    private boolean debugTextVisible = false;\n    private int startupLoadStateSlot = 0;',
                  'startup field insertion point'
              )

          if 'startupLoadStateSlot = getIntent().getIntExtra("load_state_slot", 0);' not in text:
              text = must_replace(
                  text,
                  '        if (audioBacklogSamples != -1 && audioBacklogSamples != 1024 && audioBacklogSamples != 2048 && audioBacklogSamples != 4096) {\n            audioBacklogSamples = -1;\n        }\n        String saveFolder = getIntent().getStringExtra("save_folder_uri");',
                  '        if (audioBacklogSamples != -1 && audioBacklogSamples != 1024 && audioBacklogSamples != 2048 && audioBacklogSamples != 4096) {\n            audioBacklogSamples = -1;\n        }\n        startupLoadStateSlot = getIntent().getIntExtra("load_state_slot", 0);\n        if (startupLoadStateSlot < 1 || startupLoadStateSlot > 5) {\n            startupLoadStateSlot = 0;\n        }\n        String saveFolder = getIntent().getStringExtra("save_folder_uri");',
                  'startup intent insertion point'
              )

          if 'loadStartupStateIfRequested();' not in text:
              text = must_replace(
                  text,
                  '            NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);\n            importPortableSramIfAvailable();\n            updateInfo("Running... audio preset " + audioPresetLabel(audioBacklogSamples) + "\\n" + NativeBridge.getLastError());',
                  '            NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);\n            importPortableSramIfAvailable();\n            loadStartupStateIfRequested();\n            updateInfo("Running... audio preset " + audioPresetLabel(audioBacklogSamples) + "\\n" + NativeBridge.getLastError());',
                  'startup load call insertion point'
              )

          if 'private void loadStartupStateIfRequested()' not in text:
              startup_method = '''    private void loadStartupStateIfRequested() {
        if (startupLoadStateSlot <= 0) return;
        int slot = startupLoadStateSlot;
        startupLoadStateSlot = 0;
        try {
            byte[] data = readStateBytes(slot);
            if (data == null || data.length == 0) {
                updateInfo("Startup save state not found: Slot " + slot);
                return;
            }
            boolean ok = NativeBridge.importState(data);
            updateInfo(ok ? "Startup save state loaded: Slot " + slot : "Startup load state failed:\\n" + NativeBridge.getLastError());
        } catch (Throwable t) {
            updateInfo("Startup load state failed:\\n" + t.getMessage());
        }
    }

'''
              text = must_replace(text, '    private void loadStateNow(int slot) {', startup_method + '    private void loadStateNow(int slot) {', 'loadStateNow marker')

          text = re.sub(
              r'\s*add(?:Centered)?Control\(controls, "L", NativeBridge\.BUTTON_L,.*?\);\n\s*add(?:Centered)?Control\(controls, "R", NativeBridge\.BUTTON_R,.*?\);\n\n\s*addCenteredControl\(controls, "Select", NativeBridge\.BUTTON_SELECT,.*?\);\n\s*addCenteredControl\(controls, "Start", NativeBridge\.BUTTON_START,.*?\);',
              '\n        addCenteredControl(controls, "L", NativeBridge.BUTTON_L, shoulderWidth, shoulderHeight, shoulderBottomPad, -dp(46));\n        addCenteredControl(controls, "R", NativeBridge.BUTTON_R, shoulderWidth, shoulderHeight, shoulderBottomPad, dp(46));\n\n        addCenteredControl(controls, "Select", NativeBridge.BUTTON_SELECT, startSelectWidth, startSelectHeight, dp(58), -dp(42));\n        addCenteredControl(controls, "Start", NativeBridge.BUTTON_START, startSelectWidth, startSelectHeight, dp(58), dp(42));',
              text,
              count=1,
              flags=re.S
          )

          text = text.replace('int shoulderBottomPad = dp(660);', 'int shoulderBottomPad = bottomPad + dp(184);')
          if 'int shoulderBottomPad = bottomPad + dp(184);' not in text:
              text = text.replace('int bottomPad = dp(88);', 'int bottomPad = dp(92);\n        int shoulderBottomPad = bottomPad + dp(184);')
          text = text.replace('int bottomPad = dp(88);', 'int bottomPad = dp(92);')

          old_menu_button = '''        addSystemControl(controls, "Menu", menuWidth, menuHeight,
                Gravity.TOP | Gravity.RIGHT, margin, dp(8), this::showQuickMenu);'''
          new_top_buttons = '''        addSystemControl(controls, "Save", menuWidth, menuHeight,
                Gravity.TOP | Gravity.RIGHT, margin + menuWidth * 2 + dp(16), dp(8), () -> showStateSlotDialog(true));
        addSystemControl(controls, "Load", menuWidth, menuHeight,
                Gravity.TOP | Gravity.RIGHT, margin + menuWidth + dp(8), dp(8), () -> showStateSlotDialog(false));
        addSystemControl(controls, "☰", dp(48), menuHeight,
                Gravity.TOP | Gravity.RIGHT, margin, dp(8), this::showQuickMenu);'''
          if 'addSystemControl(controls, "Save", menuWidth, menuHeight' not in text:
              text = must_replace(text, old_menu_button, new_top_buttons, 'top-right menu button block')

          new_quick_menu = '''    private void showQuickMenu() {
        pauseEmulationForMenu();
        releaseAllButtons();
        String[] items = {"Resume", "Restart Game", "Return to Main Menu", "Display Settings", "Audio Preset", "Exit Game"};
        new AlertDialog.Builder(this)
                .setTitle("KrendBuoy Menu")
                .setItems(items, (dialog, which) -> {
                    if (which == 0) {
                        resumeEmulationFromMenu();
                        dialog.dismiss();
                    } else if (which == 1) {
                        restartGame();
                    } else if (which == 2) {
                        leaveGame();
                    } else if (which == 3) {
                        showDisplaySettingsDialog();
                    } else if (which == 4) {
                        showAudioPresetDialog();
                    } else if (which == 5) {
                        leaveGame();
                    }
                })
                .setOnCancelListener(dialog -> resumeEmulationFromMenu())
                .show();
    }

'''
          text, n = re.subn(r'    private void showQuickMenu\(\) \{.*?\n    \}\n\n    private void pauseEmulationForMenu\(\) \{', new_quick_menu + '    private void pauseEmulationForMenu() {', text, count=1, flags=re.S)
          if n != 1:
              raise SystemExit('showQuickMenu method not found')

          if 'private void restartGame()' not in text:
              restart_method = '''    private void restartGame() {
        if (finishingFromMenu) return;
        finishingFromMenu = true;
        NativeBridge.saveSram();
        exportPortableSramIfEnabled();
        releaseAllButtons();
        stopAudioPlayback();
        startActivity(getIntent());
        finish();
    }

'''
              text = must_replace(text, '    private void leaveGame() {', restart_method + '    private void leaveGame() {', 'leaveGame marker')

          old_save = '                    if (save) {\n                        saveStateNow(slot);\n                    } else {\n                        loadStateNow(slot);\n                    }'
          new_save = '                    if (save) {\n                        confirmAndSaveState(slot);\n                    } else {\n                        loadStateNow(slot);\n                    }'
          if old_save in text:
              text = text.replace(old_save, new_save, 1)
          elif new_save not in text:
              raise SystemExit('save/load slot handler not found')

          if 'private void confirmAndSaveState(int slot)' not in text:
              confirm_method = '''    private void confirmAndSaveState(int slot) {
        if (getStateModifiedTime(slot) <= 0) {
            saveStateNow(slot);
            return;
        }
        new AlertDialog.Builder(this)
                .setTitle("Overwrite Save State")
                .setMessage("Slot " + slot + " already has a save state.\n" + stateSlotLabel(slot) + "\n\nOverwrite it?")
                .setPositiveButton("Overwrite", (dialog, which) -> saveStateNow(slot))
                .setNegativeButton("Cancel", (dialog, which) -> resumeEmulationFromMenu())
                .setOnCancelListener(dialog -> resumeEmulationFromMenu())
                .show();
    }

'''
              text = must_replace(text, '    private void saveStateNow(int slot) {', confirm_method + '    private void saveStateNow(int slot) {', 'saveStateNow marker')

          if 'private void addCenteredSystemControl' not in text:
              helper = '''    private void addCenteredSystemControl(FrameLayout parent, String label, int width, int height, int bottomMargin, Runnable action) {
        TextView view = makeSystemButton(label, action);
        FrameLayout.LayoutParams lp = new FrameLayout.LayoutParams(width, height, Gravity.BOTTOM | Gravity.CENTER_HORIZONTAL);
        lp.bottomMargin = bottomMargin;
        parent.addView(view, lp);
    }

'''
              text = must_replace(text, '    private void addControl(FrameLayout parent, String label, int button, int width, int height, int gravity, int horizontalMargin, int verticalMargin) {', helper + '    private void addControl(FrameLayout parent, String label, int button, int width, int height, int gravity, int horizontalMargin, int verticalMargin) {', 'addControl marker')

          if 'Controller", dp(112), dp(44)' not in text:
              start_line = '        addCenteredControl(controls, "Start", NativeBridge.BUTTON_START, startSelectWidth, startSelectHeight, dp(58), dp(42));'
              bottom_nav = '''

        addSystemControl(controls, "Controller", dp(112), dp(44),
                Gravity.BOTTOM | Gravity.LEFT, margin, dp(4), this::showControllerSettingsDialog);
        addCenteredSystemControl(controls, "Cheats", dp(104), dp(44), dp(4), this::showCheatsComingSoon);
        addSystemControl(controls, "Settings", dp(112), dp(44),
                Gravity.BOTTOM | Gravity.RIGHT, margin, dp(4), this::showGlobalSettingsDialog);'''
              text = must_replace(text, start_line, start_line + bottom_nav, 'bottom nav insertion point')

          if 'private void showControllerSettingsDialog()' not in text:
              methods = '''    private void showControllerSettingsDialog() {
        pauseEmulationForMenu();
        String[] items = {"Controller Layout: GBA SP Style", "Button Size: Default", "Button Opacity: Default"};
        new AlertDialog.Builder(this)
                .setTitle("Controller Settings")
                .setItems(items, (dialog, which) -> {
                    showQuickNotice("Controller Settings", "Controller customization will be added in a later build.");
                })
                .setNegativeButton("Cancel", (dialog, which) -> resumeEmulationFromMenu())
                .setOnCancelListener(dialog -> resumeEmulationFromMenu())
                .show();
    }

    private void showCheatsComingSoon() {
        pauseEmulationForMenu();
        showQuickNotice("Cheats", "Cheat support is not implemented yet.");
    }

    private void showGlobalSettingsDialog() {
        pauseEmulationForMenu();
        String[] items = {"Controller Settings", "Display Settings", "Audio Preset"};
        new AlertDialog.Builder(this)
                .setTitle("Settings")
                .setItems(items, (dialog, which) -> {
                    if (which == 0) showControllerSettingsDialog();
                    else if (which == 1) showDisplaySettingsDialog();
                    else if (which == 2) showAudioPresetDialog();
                })
                .setNegativeButton("Cancel", (dialog, which) -> resumeEmulationFromMenu())
                .setOnCancelListener(dialog -> resumeEmulationFromMenu())
                .show();
    }

'''
              text = must_replace(text, '    private void showDisplaySettingsDialog() {', methods + '    private void showDisplaySettingsDialog() {', 'showDisplaySettingsDialog marker')

          required = [
              'addSystemControl(controls, "Save",',
              'addSystemControl(controls, "Load",',
              'addSystemControl(controls, "☰",',
              'String[] items = {"Resume", "Restart Game", "Return to Main Menu", "Display Settings", "Audio Preset", "Exit Game"};',
              'private void restartGame()',
              'private void showControllerSettingsDialog()',
              'private void showGlobalSettingsDialog()',
              'addCenteredSystemControl(controls, "Cheats"',
              'private void loadStartupStateIfRequested()',
              'private void confirmAndSaveState(int slot)'
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('Game UI patch incomplete: ' + ', '.join(missing))

          path.write_text(text)
          PY

      - name: Commit GameActivity UI update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app/src/main/java/com/keltic/vbam/GameActivity.java
          if git diff --cached --quiet; then
            echo "No GameActivity UI changes to commit."
          else
            git commit -m "Add in-game controller shell UI"
            git push
          fi

      - name: Create stable debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keystore android-app/debug.keystore \
            -dname "CN=Android Debug,O=KrendStudio,C=TW" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
