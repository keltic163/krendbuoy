name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply frontend test patches
        run: |
          python3 - <<'PY'
          from pathlib import Path

          gradle = Path('android-app/build.gradle')
          text = gradle.read_text()
          if 'storeFile file("debug.keystore")' not in text:
              text = text.replace('    defaultConfig {', '    signingConfigs {\n        debug {\n            storeFile file("debug.keystore")\n            storePassword "android"\n            keyAlias "androiddebugkey"\n            keyPassword "android"\n        }\n    }\n\n    defaultConfig {')
              text = text.replace('        release {', '        debug {\n            signingConfig signingConfigs.debug\n        }\n\n        release {')
          gradle.write_text(text)

          game = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = game.read_text()
          text = text.replace('"Resume", "Change ROM", "Audio Preset", "Exit Game"', '"Resume", "Return to Main Menu", "Save State", "Load State", "Audio Preset", "Exit Game"')
          text = text.replace('''                    } else if (which == 1) {\n                        leaveGame();\n                    } else if (which == 2) {\n                        showAudioPresetDialog();\n                    } else if (which == 3) {\n                        leaveGame();\n                    }''', '''                    } else if (which == 1) {\n                        leaveGame();\n                    } else if (which == 2) {\n                        showStateSlotDialog(true);\n                    } else if (which == 3) {\n                        showStateSlotDialog(false);\n                    } else if (which == 4) {\n                        showAudioPresetDialog();\n                    } else if (which == 5) {\n                        leaveGame();\n                    }''')
          insert_after = '''    private void leaveGame() {\n        if (finishingFromMenu) return;\n        finishingFromMenu = true;\n        NativeBridge.saveSram();\n        exportPortableSramIfEnabled();\n        releaseAllButtons();\n        finish();\n    }\n'''
          save_state_methods = '''\n    private void showStateSlotDialog(boolean save) {\n        String[] labels = {"Slot 1", "Slot 2", "Slot 3", "Slot 4", "Slot 5"};\n        new AlertDialog.Builder(this)\n                .setTitle(save ? "Save State" : "Load State")\n                .setItems(labels, (dialog, which) -> {\n                    int slot = which + 1;\n                    if (save) {\n                        saveStateNow(slot);\n                    } else {\n                        loadStateNow(slot);\n                    }\n                })\n                .setNegativeButton("Cancel", null)\n                .show();\n    }\n\n    private void saveStateNow(int slot) {\n        try {\n            byte[] data = NativeBridge.exportState();\n            if (data == null || data.length == 0) {\n                showQuickNotice("Save State", "Save state failed:\\n" + NativeBridge.getLastError());\n                return;\n            }\n            if (writeStateBytes(data, slot)) {\n                showQuickNotice("Save State", "Saved to Slot " + slot + "\\n" + stateFileName(slot));\n            } else {\n                showQuickNotice("Save State", "Save state write failed.");\n            }\n        } catch (Throwable t) {\n            showQuickNotice("Save State", "Save state failed:\\n" + t.getMessage());\n        }\n    }\n\n    private void loadStateNow(int slot) {\n        try {\n            byte[] data = readStateBytes(slot);\n            if (data == null || data.length == 0) {\n                showQuickNotice("Load State", "No save state found in Slot " + slot + ".");\n                return;\n            }\n            boolean ok = NativeBridge.importState(data);\n            if (ok) {\n                showQuickNotice("Load State", "Loaded Slot " + slot + "\\n" + stateFileName(slot));\n            } else {\n                showQuickNotice("Load State", "Load state failed:\\n" + NativeBridge.getLastError());\n            }\n        } catch (Throwable t) {\n            showQuickNotice("Load State", "Load state failed:\\n" + t.getMessage());\n        }\n    }\n\n    private void showQuickNotice(String title, String message) {\n        updateInfo(message);\n        runOnUiThread(() -> new AlertDialog.Builder(this)\n                .setTitle(title)\n                .setMessage(message)\n                .setPositiveButton("OK", null)\n                .show());\n    }\n\n    private String stateFileName(int slot) {\n        return sanitizeFileName(romBaseName) + ".slot" + slot + ".state";\n    }\n\n    private boolean writeStateBytes(byte[] data, int slot) throws Exception {\n        if (portableSaveFolderUri != null) {\n            Uri stateDir = getOrCreatePortableStateFolder();\n            if (stateDir == null) return false;\n            Uri target = findChildDocumentIn(stateDir, stateFileName(slot));\n            if (target == null) target = createChildDocumentIn(stateDir, stateFileName(slot), "application/octet-stream");\n            if (target == null) return false;\n            try (OutputStream output = getContentResolver().openOutputStream(target, "wt")) {\n                if (output == null) return false;\n                output.write(data);\n                output.flush();\n                return true;\n            }\n        }\n        File stateDir = new File(ensureDirectory("states"), sanitizeFileName(romBaseName));\n        if (!stateDir.exists() && !stateDir.mkdirs()) return false;\n        File outFile = new File(stateDir, stateFileName(slot));\n        try (FileOutputStream output = new FileOutputStream(outFile)) {\n            output.write(data);\n            output.flush();\n            return true;\n        }\n    }\n\n    private byte[] readStateBytes(int slot) throws Exception {\n        if (portableSaveFolderUri != null) {\n            Uri stateDir = getOrCreatePortableStateFolder();\n            if (stateDir == null) return null;\n            Uri state = findChildDocumentIn(stateDir, stateFileName(slot));\n            if (state == null) return null;\n            return readAllBytes(state);\n        }\n        File stateDir = new File(ensureDirectory("states"), sanitizeFileName(romBaseName));\n        File inFile = new File(stateDir, stateFileName(slot));\n        if (!inFile.exists()) return null;\n        try (InputStream input = new java.io.FileInputStream(inFile);\n             ByteArrayOutputStream output = new ByteArrayOutputStream()) {\n            byte[] buffer = new byte[1024 * 16];\n            int read;\n            while ((read = input.read(buffer)) != -1) output.write(buffer, 0, read);\n            return output.toByteArray();\n        }\n    }\n\n    private Uri getOrCreatePortableStateFolder() throws Exception {\n        if (portableSaveFolderUri == null) return null;\n        Uri root = DocumentsContract.buildDocumentUriUsingTree(\n                portableSaveFolderUri,\n                DocumentsContract.getTreeDocumentId(portableSaveFolderUri)\n        );\n        Uri existing = findChildDocumentIn(root, "KrendBuoy States");\n        if (existing != null) return existing;\n        return createChildDocumentIn(root, "KrendBuoy States", DocumentsContract.Document.MIME_TYPE_DIR);\n    }\n\n    private Uri findChildDocumentIn(Uri parentDocumentUri, String fileName) {\n        if (portableSaveFolderUri == null || parentDocumentUri == null) return null;\n        Uri childrenUri = DocumentsContract.buildChildDocumentsUriUsingTree(\n                portableSaveFolderUri,\n                DocumentsContract.getDocumentId(parentDocumentUri)\n        );\n        try (Cursor cursor = getContentResolver().query(\n                childrenUri,\n                new String[]{DocumentsContract.Document.COLUMN_DISPLAY_NAME, DocumentsContract.Document.COLUMN_DOCUMENT_ID},\n                null,\n                null,\n                null\n        )) {\n            if (cursor == null) return null;\n            while (cursor.moveToNext()) {\n                String name = cursor.getString(0);\n                String documentId = cursor.getString(1);\n                if (fileName.equals(name)) {\n                    return DocumentsContract.buildDocumentUriUsingTree(portableSaveFolderUri, documentId);\n                }\n            }\n        }\n        return null;\n    }\n\n    private Uri createChildDocumentIn(Uri parentDocumentUri, String fileName, String mimeType) throws Exception {\n        if (parentDocumentUri == null) return null;\n        return DocumentsContract.createDocument(\n                getContentResolver(),\n                parentDocumentUri,\n                mimeType,\n                fileName\n        );\n    }\n'''
          if 'private void showStateSlotDialog' not in text:
              text = text.replace(insert_after, insert_after + save_state_methods)
          game.write_text(text)

          native = Path('android-app/src/main/cpp/native_bridge.cpp')
          text = native.read_text()
          if 'retro_serialize_size_t' not in text:
              text = text.replace('typedef size_t (*retro_get_memory_size_t)(unsigned);\ntypedef void (*retro_run_t)();', 'typedef size_t (*retro_get_memory_size_t)(unsigned);\ntypedef size_t (*retro_serialize_size_t)();\ntypedef bool (*retro_serialize_t)(void*, size_t);\ntypedef bool (*retro_unserialize_t)(const void*, size_t);\ntypedef void (*retro_run_t)();')
              text = text.replace('static retro_get_memory_size_t p_retro_get_memory_size = nullptr;\nstatic retro_run_t p_retro_run = nullptr;', 'static retro_get_memory_size_t p_retro_get_memory_size = nullptr;\nstatic retro_serialize_size_t p_retro_serialize_size = nullptr;\nstatic retro_serialize_t p_retro_serialize = nullptr;\nstatic retro_unserialize_t p_retro_unserialize = nullptr;\nstatic retro_run_t p_retro_run = nullptr;')
              text = text.replace('p_retro_get_memory_size = reinterpret_cast<retro_get_memory_size_t>(dlsym(core, "retro_get_memory_size"));', 'p_retro_get_memory_size = reinterpret_cast<retro_get_memory_size_t>(dlsym(core, "retro_get_memory_size"));\n    p_retro_serialize_size = reinterpret_cast<retro_serialize_size_t>(dlsym(core, "retro_serialize_size"));\n    p_retro_serialize = reinterpret_cast<retro_serialize_t>(dlsym(core, "retro_serialize"));\n    p_retro_unserialize = reinterpret_cast<retro_unserialize_t>(dlsym(core, "retro_unserialize"));')
              marker = 'extern "C" JNIEXPORT jboolean JNICALL Java_com_krendstudio_krendbuoy_NativeBridge_saveSram(JNIEnv*, jclass) { return loaded ? JNI_TRUE : JNI_FALSE; }'
              state_jni = '''extern "C" JNIEXPORT jbyteArray JNICALL Java_com_krendstudio_krendbuoy_NativeBridge_exportState(JNIEnv* env, jclass) {\n    if (!loaded || !p_retro_serialize_size || !p_retro_serialize) { last = "Save state unavailable."; return nullptr; }\n    size_t size = p_retro_serialize_size();\n    if (size == 0) { last = "Save state size is zero."; return nullptr; }\n    std::vector<uint8_t> buffer(size);\n    if (!p_retro_serialize(buffer.data(), size)) { last = "retro_serialize failed."; return nullptr; }\n    jbyteArray result = env->NewByteArray(static_cast<jsize>(size));\n    env->SetByteArrayRegion(result, 0, static_cast<jsize>(size), reinterpret_cast<const jbyte*>(buffer.data()));\n    last = "Save state exported. bytes=" + std::to_string(size);\n    return result;\n}\nextern "C" JNIEXPORT jboolean JNICALL Java_com_krendstudio_krendbuoy_NativeBridge_importState(JNIEnv* env, jclass, jbyteArray input) {\n    if (!loaded || !input || !p_retro_unserialize) { last = "Load state unavailable."; return JNI_FALSE; }\n    jsize size = env->GetArrayLength(input);\n    if (size <= 0) { last = "Load state input is empty."; return JNI_FALSE; }\n    std::vector<jbyte> buffer(static_cast<size_t>(size));\n    env->GetByteArrayRegion(input, 0, size, buffer.data());\n    bool ok = p_retro_unserialize(buffer.data(), static_cast<size_t>(size));\n    last = ok ? ("Save state loaded. bytes=" + std::to_string(size)) : "retro_unserialize failed.";\n    return ok ? JNI_TRUE : JNI_FALSE;\n}\n'''
              text = text.replace(marker, state_jni + marker)
          native.write_text(text)
          PY

      - name: Pause emulation while quick menu is open
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = path.read_text()
          text = text.replace('private volatile boolean finishingFromMenu;\n', 'private volatile boolean finishingFromMenu;\n    private volatile boolean menuPaused;\n')
          text = text.replace('while (running) {\n                long start = System.currentTimeMillis();', 'while (running) {\n                if (menuPaused) {\n                    try {\n                        Thread.sleep(16);\n                    } catch (InterruptedException ignored) {\n                        Thread.currentThread().interrupt();\n                        running = false;\n                    }\n                    continue;\n                }\n                long start = System.currentTimeMillis();')

          old_quick = '''    private void showQuickMenu() {\n        releaseAllButtons();\n        String[] items = {"Resume", "Return to Main Menu", "Save State", "Load State", "Audio Preset", "Exit Game"};\n        new AlertDialog.Builder(this)\n                .setTitle("KrendBuoy Menu")\n                .setItems(items, (dialog, which) -> {\n                    if (which == 0) {\n                        dialog.dismiss();\n                    } else if (which == 1) {\n                        leaveGame();\n                    } else if (which == 2) {\n                        showStateSlotDialog(true);\n                    } else if (which == 3) {\n                        showStateSlotDialog(false);\n                    } else if (which == 4) {\n                        showAudioPresetDialog();\n                    } else if (which == 5) {\n                        leaveGame();\n                    }\n                })\n                .show();\n    }\n'''
          new_quick = '''    private void showQuickMenu() {\n        pauseEmulationForMenu();\n        releaseAllButtons();\n        String[] items = {"Resume", "Return to Main Menu", "Save State", "Load State", "Audio Preset", "Exit Game"};\n        new AlertDialog.Builder(this)\n                .setTitle("KrendBuoy Menu")\n                .setItems(items, (dialog, which) -> {\n                    if (which == 0) {\n                        resumeEmulationFromMenu();\n                        dialog.dismiss();\n                    } else if (which == 1) {\n                        leaveGame();\n                    } else if (which == 2) {\n                        showStateSlotDialog(true);\n                    } else if (which == 3) {\n                        showStateSlotDialog(false);\n                    } else if (which == 4) {\n                        showAudioPresetDialog();\n                    } else if (which == 5) {\n                        leaveGame();\n                    }\n                })\n                .setOnCancelListener(dialog -> resumeEmulationFromMenu())\n                .show();\n    }\n'''
          text = text.replace(old_quick, new_quick)

          pause_methods = '''\n    private void pauseEmulationForMenu() {\n        if (finishingFromMenu) return;\n        menuPaused = true;\n        releaseAllButtons();\n        stopAudioPlayback();\n    }\n\n    private void resumeEmulationFromMenu() {\n        if (finishingFromMenu) return;\n        if (!running) return;\n        if (!menuPaused) return;\n        menuPaused = false;\n        startAudioPlayback();\n    }\n'''
          if 'private void pauseEmulationForMenu()' not in text:
              text = text.replace('''    private void showAudioPresetDialog() {\n''', pause_methods + '\n    private void showAudioPresetDialog() {\n')

          old_audio = '''    private void showAudioPresetDialog() {\n        String[] labels = {\n                "Dynamic - recommended",\n                "1024 - ultra low latency, may crackle",\n                "2048 - low latency",\n                "4096 - balanced"\n        };\n        int[] values = {-1, 1024, 2048, 4096};\n        int checked = 0;\n        for (int i = 0; i < values.length; i++) {\n            if (values[i] == audioBacklogSamples) {\n                checked = i;\n                break;\n            }\n        }\n        new AlertDialog.Builder(this)\n                .setTitle("Audio Preset")\n                .setSingleChoiceItems(labels, checked, (dialog, which) -> {\n                    audioBacklogSamples = values[which];\n                    NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);\n                    updateInfo("audio preset " + audioPresetLabel(audioBacklogSamples) + "\\n" + NativeBridge.getLastError());\n                    dialog.dismiss();\n                })\n                .setNegativeButton("Cancel", null)\n                .show();\n    }\n'''
          new_audio = '''    private void showAudioPresetDialog() {\n        String[] labels = {\n                "Dynamic - recommended",\n                "1024 - ultra low latency, may crackle",\n                "2048 - low latency",\n                "4096 - balanced"\n        };\n        int[] values = {-1, 1024, 2048, 4096};\n        int checked = 0;\n        for (int i = 0; i < values.length; i++) {\n            if (values[i] == audioBacklogSamples) {\n                checked = i;\n                break;\n            }\n        }\n        new AlertDialog.Builder(this)\n                .setTitle("Audio Preset")\n                .setSingleChoiceItems(labels, checked, (dialog, which) -> {\n                    audioBacklogSamples = values[which];\n                    NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);\n                    updateInfo("audio preset " + audioPresetLabel(audioBacklogSamples) + "\\n" + NativeBridge.getLastError());\n                    dialog.dismiss();\n                })\n                .setNegativeButton("Cancel", null)\n                .setOnDismissListener(dialog -> resumeEmulationFromMenu())\n                .show();\n    }\n'''
          text = text.replace(old_audio, new_audio)
          text = text.replace('.setNegativeButton("Cancel", null)\n                .show();\n    }\n\n    private void saveStateNow', '.setNegativeButton("Cancel", (dialog, which) -> resumeEmulationFromMenu())\n                .setOnCancelListener(dialog -> resumeEmulationFromMenu())\n                .show();\n    }\n\n    private void saveStateNow')
          text = text.replace('.setPositiveButton("OK", null)\n                .show());', '.setPositiveButton("OK", null)\n                .setOnDismissListener(dialog -> resumeEmulationFromMenu())\n                .show());')
          path.write_text(text)
          PY

      - name: Create stable debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keystore android-app/debug.keystore \
            -dname "CN=Android Debug,O=KrendStudio,C=TW" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
