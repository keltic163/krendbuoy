name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Consolidate GameActivity patches into source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = path.read_text()

          if 'int shoulderBottomPad = dp(660);' not in text:
              text = text.replace('int bottomPad = dp(88);', 'int bottomPad = dp(88);\n        int shoulderBottomPad = dp(660);')
          old_lr = '        addCenteredControl(controls, "L", NativeBridge.BUTTON_L, shoulderWidth, shoulderHeight, dp(66), -dp(54));\n        addCenteredControl(controls, "R", NativeBridge.BUTTON_R, shoulderWidth, shoulderHeight, dp(66), dp(54));\n\n        addCenteredControl(controls, "Select", NativeBridge.BUTTON_SELECT, startSelectWidth, startSelectHeight, dp(18), -dp(62));\n        addCenteredControl(controls, "Start", NativeBridge.BUTTON_START, startSelectWidth, startSelectHeight, dp(18), dp(62));'
          new_lr = '        addControl(controls, "L", NativeBridge.BUTTON_L, shoulderWidth, shoulderHeight,\n                Gravity.BOTTOM | Gravity.LEFT, margin, shoulderBottomPad);\n        addControl(controls, "R", NativeBridge.BUTTON_R, shoulderWidth, shoulderHeight,\n                Gravity.BOTTOM | Gravity.RIGHT, margin, shoulderBottomPad);\n\n        addCenteredControl(controls, "Select", NativeBridge.BUTTON_SELECT, startSelectWidth, startSelectHeight, dp(18), -dp(72));\n        addCenteredControl(controls, "Start", NativeBridge.BUTTON_START, startSelectWidth, startSelectHeight, dp(18), dp(72));'
          if old_lr in text:
              text = text.replace(old_lr, new_lr)
          elif new_lr not in text:
              raise SystemExit('Expected L/R layout block not found')

          if 'private int startupLoadStateSlot = 0;' not in text:
              text = text.replace(
                  '    private int displayMode = 0;\n    private boolean debugTextVisible = false;',
                  '    private int displayMode = 0;\n    private boolean debugTextVisible = false;\n    private int startupLoadStateSlot = 0;'
              )
          if 'startupLoadStateSlot = getIntent().getIntExtra("load_state_slot", 0);' not in text:
              old = '        if (audioBacklogSamples != -1 && audioBacklogSamples != 1024 && audioBacklogSamples != 2048 && audioBacklogSamples != 4096) {\n            audioBacklogSamples = -1;\n        }\n        String saveFolder = getIntent().getStringExtra("save_folder_uri");'
              new = '        if (audioBacklogSamples != -1 && audioBacklogSamples != 1024 && audioBacklogSamples != 2048 && audioBacklogSamples != 4096) {\n            audioBacklogSamples = -1;\n        }\n        startupLoadStateSlot = getIntent().getIntExtra("load_state_slot", 0);\n        if (startupLoadStateSlot < 1 || startupLoadStateSlot > 5) {\n            startupLoadStateSlot = 0;\n        }\n        String saveFolder = getIntent().getStringExtra("save_folder_uri");'
              if old not in text:
                  raise SystemExit('Intent load_state_slot insertion point not found')
              text = text.replace(old, new)
          if 'loadStartupStateIfRequested();' not in text:
              old = '            NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);\n            importPortableSramIfAvailable();\n            updateInfo("Running... audio preset " + audioPresetLabel(audioBacklogSamples) + "\\n" + NativeBridge.getLastError());'
              new = '            NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);\n            importPortableSramIfAvailable();\n            loadStartupStateIfRequested();\n            updateInfo("Running... audio preset " + audioPresetLabel(audioBacklogSamples) + "\\n" + NativeBridge.getLastError());'
              if old not in text:
                  raise SystemExit('Startup load call insertion point not found')
              text = text.replace(old, new)
          if 'private void loadStartupStateIfRequested()' not in text:
              marker = '    private void loadStateNow(int slot) {'
              method = (
                  '    private void loadStartupStateIfRequested() {\n'
                  '        if (startupLoadStateSlot <= 0) return;\n'
                  '        int slot = startupLoadStateSlot;\n'
                  '        startupLoadStateSlot = 0;\n'
                  '        try {\n'
                  '            byte[] data = readStateBytes(slot);\n'
                  '            if (data == null || data.length == 0) {\n'
                  '                updateInfo("Startup save state not found: Slot " + slot);\n'
                  '                return;\n'
                  '            }\n'
                  '            boolean ok = NativeBridge.importState(data);\n'
                  '            updateInfo(ok ? "Startup save state loaded: Slot " + slot : "Startup load state failed:\\n" + NativeBridge.getLastError());\n'
                  '        } catch (Throwable t) {\n'
                  '            updateInfo("Startup load state failed:\\n" + t.getMessage());\n'
                  '        }\n'
                  '    }\n\n'
              )
              if marker not in text:
                  raise SystemExit('loadStateNow marker not found')
              text = text.replace(marker, method + marker)

          old_save = '                    if (save) {\n                        saveStateNow(slot);\n                    } else {\n                        loadStateNow(slot);\n                    }'
          new_save = '                    if (save) {\n                        confirmAndSaveState(slot);\n                    } else {\n                        loadStateNow(slot);\n                    }'
          if old_save in text:
              text = text.replace(old_save, new_save, 1)
          elif new_save not in text:
              raise SystemExit('Save state slot handler not found')
          if 'private void confirmAndSaveState(int slot)' not in text:
              marker = '    private void saveStateNow(int slot) {'
              method = (
                  '    private void confirmAndSaveState(int slot) {\n'
                  '        if (getStateModifiedTime(slot) <= 0) {\n'
                  '            saveStateNow(slot);\n'
                  '            return;\n'
                  '        }\n'
                  '        new AlertDialog.Builder(this)\n'
                  '                .setTitle("Overwrite Save State")\n'
                  '                .setMessage("Slot " + slot + " already has a save state.\\n" + stateSlotLabel(slot) + "\\n\\nOverwrite it?")\n'
                  '                .setPositiveButton("Overwrite", (dialog, which) -> saveStateNow(slot))\n'
                  '                .setNegativeButton("Cancel", (dialog, which) -> resumeEmulationFromMenu())\n'
                  '                .setOnCancelListener(dialog -> resumeEmulationFromMenu())\n'
                  '                .show();\n'
                  '    }\n\n'
              )
              if marker not in text:
                  raise SystemExit('saveStateNow marker not found')
              text = text.replace(marker, method + marker)

          required = [
              'private int startupLoadStateSlot = 0;',
              'startupLoadStateSlot = getIntent().getIntExtra("load_state_slot", 0);',
              'loadStartupStateIfRequested();',
              'private void loadStartupStateIfRequested()',
              'private void confirmAndSaveState(int slot)',
              'int shoulderBottomPad = dp(660);'
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('Source consolidation incomplete: ' + ', '.join(missing))
          path.write_text(text)
          PY

      - name: Commit GameActivity consolidation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app/src/main/java/com/keltic/vbam/GameActivity.java
          if git diff --cached --quiet; then
            echo "No GameActivity consolidation changes to commit."
          else
            git commit -m "Consolidate GameActivity patches into source"
            git push
          fi

      - name: Create stable debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keystore android-app/debug.keystore \
            -dname "CN=Android Debug,O=KrendStudio,C=TW" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
