name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Patch GameActivity in-game UI
        run: |
          python3 - <<'PY'
          import base64
          import subprocess
          script = base64.b64decode("").decode("utf-8")
          with open('/tmp/patch_game_ui.py', 'w', encoding='utf-8') as f:
              f.write(script)
          subprocess.check_call(['python3', '/tmp/patch_game_ui.py'])
          PY

      - name: Commit GameActivity UI update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app/src/main/java/com/keltic/vbam/GameActivity.java
          if git diff --cached --quiet; then
            echo "No GameActivity UI changes to commit."
          else
            git commit -m "Add in-game controller shell UI"
            git push
          fi

      - name: Create stable debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keystore android-app/debug.keystore \
            -dname "CN=Android Debug,O=KrendStudio,C=TW" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
