name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply L/R layout patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = path.read_text()
          text = text.replace('int bottomPad = dp(88);', 'int bottomPad = dp(88);\n        int shoulderBottomPad = dp(660);')
          text = text.replace('''        addCenteredControl(controls, "L", NativeBridge.BUTTON_L, shoulderWidth, shoulderHeight, dp(66), -dp(54));
        addCenteredControl(controls, "R", NativeBridge.BUTTON_R, shoulderWidth, shoulderHeight, dp(66), dp(54));

        addCenteredControl(controls, "Select", NativeBridge.BUTTON_SELECT, startSelectWidth, startSelectHeight, dp(18), -dp(62));
        addCenteredControl(controls, "Start", NativeBridge.BUTTON_START, startSelectWidth, startSelectHeight, dp(18), dp(62));''', '''        addControl(controls, "L", NativeBridge.BUTTON_L, shoulderWidth, shoulderHeight,
                Gravity.BOTTOM | Gravity.LEFT, margin, shoulderBottomPad);
        addControl(controls, "R", NativeBridge.BUTTON_R, shoulderWidth, shoulderHeight,
                Gravity.BOTTOM | Gravity.RIGHT, margin, shoulderBottomPad);

        addCenteredControl(controls, "Select", NativeBridge.BUTTON_SELECT, startSelectWidth, startSelectHeight, dp(18), -dp(72));
        addCenteredControl(controls, "Start", NativeBridge.BUTTON_START, startSelectWidth, startSelectHeight, dp(18), dp(72));''')
          path.write_text(text)
          PY

      - name: Create stable debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keystore android-app/debug.keystore \
            -dname "CN=Android Debug,O=KrendStudio,C=TW" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
