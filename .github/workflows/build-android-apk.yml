name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply low latency audio patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          game = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = game.read_text()
          text = text.replace('int bufferBytes = Math.max(minBufferBytes * 2, sampleRate);', 'int bufferBytes = minBufferBytes;')
          text = text.replace('int shortBufferSize = Math.max(2048, bufferBytes / 2);', 'int shortBufferSize = Math.max(512, bufferBytes / 4);')
          text = text.replace('Thread.sleep(4);', 'Thread.sleep(1);')
          text = text.replace('updateInfo(NativeBridge.getLastError());', 'updateInfo("audio 2048 backlog test\\n" + NativeBridge.getLastError());')
          text = text.replace('.setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)\n                        .build()', '.setContentType(AudioAttributes.CONTENT_TYPE_MUSIC)\n                        .setFlags(AudioAttributes.FLAG_LOW_LATENCY)\n                        .build()')
          game.write_text(text)

          native = Path('android-app/src/main/cpp/native_bridge.cpp')
          text = native.read_text()
          text = text.replace('static constexpr size_t MAX_AUDIO_SAMPLES = 32768;', 'static constexpr size_t MAX_AUDIO_SAMPLES = 2048;')
          text = text.replace('size_t count = std::min(static_cast<size_t>(std::min(maxSamples, capacity)), audioBuffer.size());\n    if (count == 0) return 0;\n    env->SetShortArrayRegion(out, 0, static_cast<jsize>(count), reinterpret_cast<const jshort*>(audioBuffer.data()));\n    audioBuffer.erase(audioBuffer.begin(), audioBuffer.begin() + static_cast<long>(count));', 'if (audioBuffer.size() > MAX_AUDIO_SAMPLES) {\n        audioBuffer.erase(audioBuffer.begin(), audioBuffer.end() - static_cast<long>(MAX_AUDIO_SAMPLES));\n    }\n    size_t count = std::min(static_cast<size_t>(std::min(maxSamples, capacity)), audioBuffer.size());\n    if (count == 0) return 0;\n    env->SetShortArrayRegion(out, 0, static_cast<jsize>(count), reinterpret_cast<const jshort*>(audioBuffer.data()));\n    audioBuffer.erase(audioBuffer.begin(), audioBuffer.begin() + static_cast<long>(count));')
          native.write_text(text)
          PY

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
