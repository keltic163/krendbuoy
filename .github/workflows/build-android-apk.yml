name: build-android-apk

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-android-apk.yml'
      - 'scripts/build-android-libretro.sh'
      - 'src/libretro/**'
      - 'src/core/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply L/R layout patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = path.read_text()
          if 'int shoulderBottomPad = dp(660);' not in text:
              text = text.replace('int bottomPad = dp(88);', 'int bottomPad = dp(88);\n        int shoulderBottomPad = dp(660);')
          old = '        addCenteredControl(controls, "L", NativeBridge.BUTTON_L, shoulderWidth, shoulderHeight, dp(66), -dp(54));\n        addCenteredControl(controls, "R", NativeBridge.BUTTON_R, shoulderWidth, shoulderHeight, dp(66), dp(54));\n\n        addCenteredControl(controls, "Select", NativeBridge.BUTTON_SELECT, startSelectWidth, startSelectHeight, dp(18), -dp(62));\n        addCenteredControl(controls, "Start", NativeBridge.BUTTON_START, startSelectWidth, startSelectHeight, dp(18), dp(62));'
          new = '        addControl(controls, "L", NativeBridge.BUTTON_L, shoulderWidth, shoulderHeight,\n                Gravity.BOTTOM | Gravity.LEFT, margin, shoulderBottomPad);\n        addControl(controls, "R", NativeBridge.BUTTON_R, shoulderWidth, shoulderHeight,\n                Gravity.BOTTOM | Gravity.RIGHT, margin, shoulderBottomPad);\n\n        addCenteredControl(controls, "Select", NativeBridge.BUTTON_SELECT, startSelectWidth, startSelectHeight, dp(18), -dp(72));\n        addCenteredControl(controls, "Start", NativeBridge.BUTTON_START, startSelectWidth, startSelectHeight, dp(18), dp(72));'
          if old not in text:
              raise SystemExit('Expected L/R layout block not found')
          text = text.replace(old, new)
          path.write_text(text)
          PY

      - name: Apply startup save state slot patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('android-app/src/main/java/com/keltic/vbam/GameActivity.java')
          text = path.read_text()

          if 'private int startupLoadStateSlot = 0;' not in text:
              text = text.replace('    private int displayMode = 0;\n    private boolean debugTextVisible = false;', '    private int displayMode = 0;\n    private boolean debugTextVisible = false;\n    private int startupLoadStateSlot = 0;')

          if 'startupLoadStateSlot = getIntent().getIntExtra("load_state_slot", 0);' not in text:
              text = text.replace('''        if (audioBacklogSamples != -1 && audioBacklogSamples != 1024 && audioBacklogSamples != 2048 && audioBacklogSamples != 4096) {
            audioBacklogSamples = -1;
        }
        String saveFolder = getIntent().getStringExtra("save_folder_uri");''', '''        if (audioBacklogSamples != -1 && audioBacklogSamples != 1024 && audioBacklogSamples != 2048 && audioBacklogSamples != 4096) {
            audioBacklogSamples = -1;
        }
        startupLoadStateSlot = getIntent().getIntExtra("load_state_slot", 0);
        if (startupLoadStateSlot < 1 || startupLoadStateSlot > 5) {
            startupLoadStateSlot = 0;
        }
        String saveFolder = getIntent().getStringExtra("save_folder_uri");''')

          if 'loadStartupStateIfRequested();' not in text:
              text = text.replace('''            NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);
            importPortableSramIfAvailable();
            updateInfo("Running... audio preset " + audioPresetLabel(audioBacklogSamples) + "\\n" + NativeBridge.getLastError());''', '''            NativeBridge.setAudioMaxBufferedSamples(audioBacklogSamples);
            importPortableSramIfAvailable();
            loadStartupStateIfRequested();
            updateInfo("Running... audio preset " + audioPresetLabel(audioBacklogSamples) + "\\n" + NativeBridge.getLastError());''')

          if 'private void loadStartupStateIfRequested()' not in text:
              marker = '    private void loadStateNow(int slot) {'
              method = '''    private void loadStartupStateIfRequested() {
        if (startupLoadStateSlot <= 0) return;
        int slot = startupLoadStateSlot;
        startupLoadStateSlot = 0;
        try {
            byte[] data = readStateBytes(slot);
            if (data == null || data.length == 0) {
                updateInfo("Startup save state not found: Slot " + slot);
                return;
            }
            boolean ok = NativeBridge.importState(data);
            updateInfo(ok ? "Startup save state loaded: Slot " + slot : "Startup load state failed:\\n" + NativeBridge.getLastError());
        } catch (Throwable t) {
            updateInfo("Startup load state failed:\\n" + t.getMessage());
        }
    }

'''
              if marker not in text:
                  raise SystemExit('loadStateNow marker not found')
              text = text.replace(marker, method + marker)

          path.write_text(text)
          PY

      - name: Create stable debug keystore
        run: |
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -storepass android \
            -keystore android-app/debug.keystore \
            -dname "CN=Android Debug,O=KrendStudio,C=TW" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Build native core
        run: |
          chmod +x scripts/build-android-libretro.sh
          scripts/build-android-libretro.sh arm64-v8a

      - name: Prepare JNI libs
        run: |
          mkdir -p android-app/src/main/jniLibs/arm64-v8a
          cp build/android/arm64-v8a/vbam_libretro.so android-app/src/main/jniLibs/arm64-v8a/libvbam_libretro.so
          cp "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" android-app/src/main/jniLibs/arm64-v8a/libc++_shared.so
          ls -la android-app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          gradle :android-app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vbam-android-debug-apk
          path: android-app/build/outputs/apk/debug/*.apk
