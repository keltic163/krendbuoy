name: build-android-libretro

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build-android-libretro.sh'
      - 'docs/android-libretro.md'
      - 'src/libretro/**'
      - '.github/workflows/build-android-libretro.yml'
  pull_request:
    paths:
      - 'scripts/build-android-libretro.sh'
      - 'docs/android-libretro.md'
      - 'src/libretro/**'
      - '.github/workflows/build-android-libretro.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;26.3.11579264"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.3.11579264" >> $GITHUB_ENV

      - name: Make script executable
        run: chmod +x scripts/build-android-libretro.sh

      - name: Build libretro core
        env:
          ANDROID_ABI: ${{ matrix.abi }}
        run: |
          scripts/build-android-libretro.sh "${{ matrix.abi }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vbam-libretro-android-${{ matrix.abi }}
          path: build/android/${{ matrix.abi }}/
